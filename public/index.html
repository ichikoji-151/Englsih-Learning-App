<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>英語Webアプリ</title>
<link rel="stylesheet" href="style.css" />
</head>
<body>
  <h1>英単語クイズ</h1>

  <div id="mode-switch">
    <button id="mode-input-btn" type="button">日本語 → 英語（入力）</button>
    <button id="mode-choice-btn" type="button">英語 → 日本語（選択）</button>
  </div>

  <div id="quiz-area">
    <p id="prompt">読み込み中...</p>

    <div id="input-mode-ui" hidden>
      <input id="answer-input" type="text" placeholder="英語で入力" autocomplete="off" />
      <button id="submit-btn" type="button">答える</button>
    </div>

    <div id="choice-mode-ui" hidden>
      <button class="choice-btn" type="button"></button>
      <button class="choice-btn" type="button"></button>
      <button class="choice-btn" type="button"></button>
      <button class="choice-btn" type="button"></button>
    </div>

    <p id="feedback"></p>
    <button id="next-btn" type="button" hidden>次の問題</button>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/sql.js@1.10.3/dist/sql-wasm.js"></script>
  <script src="app.js"></script>
</body>
</html>
